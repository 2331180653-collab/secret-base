<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>secret base♡ – 共享日记基地</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23f6d6de'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' font-size='38'%3E%E2%99%A1%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --ink: #4e3844;
      --soft-ink: #795f70;
      --muted: #9a7c8c;
      --paper: rgba(255, 250, 246, 0.58);
      --paper-strong: rgba(255, 253, 250, 0.78);
      --line: rgba(255, 255, 255, 0.54);
      --shadow: 0 18px 50px rgba(103, 69, 92, 0.18);
      --shadow-hover: 0 24px 68px rgba(92, 58, 86, 0.25);
      --radius-card: 8px;
      --max-width: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      background:
        radial-gradient(circle at 10% 16%, rgba(255, 235, 202, 0.56) 0 18rem, transparent 19rem),
        radial-gradient(circle at 86% 10%, rgba(226, 207, 255, 0.48) 0 17rem, transparent 18rem),
        radial-gradient(circle at 78% 78%, rgba(255, 205, 220, 0.42) 0 19rem, transparent 20rem),
        linear-gradient(135deg, #f3e2c9 0%, #eec7d1 44%, #cbc3ea 100%);
      overflow-x: hidden;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      content: "";
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.42) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255, 244, 214, 0.48) 0 1px, transparent 1.5px);
      background-position: 0 0, 24px 32px;
      background-size: 54px 54px, 78px 78px;
      opacity: 0.56;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      content: "";
      background: rgba(76, 43, 67, 0.08);
    }

    .page {
      position: relative;
      width: min(100% - 32px, var(--max-width));
      margin: 0 auto;
      padding: clamp(36px, 7vw, 82px) 0 42px;
    }

    .ambient {
      position: fixed;
      z-index: -1;
      color: rgba(255, 255, 255, 0.64);
      text-shadow: 0 8px 24px rgba(114, 78, 104, 0.18);
      pointer-events: none;
      user-select: none;
      animation: floatGently 8s ease-in-out infinite;
    }

    .ambient--one {
      top: 12%;
      left: 7%;
      font-size: clamp(2rem, 5vw, 4.6rem);
    }

    .ambient--two {
      top: 18%;
      right: 9%;
      font-size: clamp(1.8rem, 4vw, 3.8rem);
      animation-delay: -2.4s;
    }

    .ambient--three {
      right: 13%;
      bottom: 16%;
      font-size: clamp(1.6rem, 4vw, 3.5rem);
      animation-delay: -4.8s;
    }

    .hero {
      display: grid;
      gap: 18px;
      max-width: 760px;
      margin: 0 auto 34px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: fit-content;
      margin: 0 auto;
      padding: 8px 13px;
      color: #70485e;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0;
      background: rgba(255, 255, 255, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.56);
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(112, 72, 94, 0.12);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      color: #513243;
      font-size: clamp(3.25rem, 11vw, 7.5rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .subtitle {
      margin: 0;
      color: #6a4b5e;
      font-size: clamp(1.02rem, 2.4vw, 1.36rem);
      font-weight: 700;
    }

    .description {
      max-width: 630px;
      margin: 0 auto;
      color: var(--soft-ink);
      font-size: clamp(0.98rem, 1.9vw, 1.12rem);
      line-height: 1.85;
    }

    .mood-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 2px;
    }

    .mood-chip {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 14px;
      color: #69485b;
      font-size: 0.92rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.44);
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 999px;
      backdrop-filter: blur(16px);
    }

    .base-dashboard {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      gap: 18px;
      margin: 0 0 34px;
    }

    .base-panel {
      position: relative;
      min-height: 170px;
      padding: 22px;
      overflow: hidden;
      color: #5d4051;
      background: rgba(255, 250, 247, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(1.16);
    }

    .base-panel::before {
      position: absolute;
      inset: auto 20px 0 auto;
      width: 90px;
      height: 90px;
      content: "";
      background: radial-gradient(circle, rgba(255, 255, 255, 0.56), transparent 70%);
      transform: translateY(34px);
    }

    .panel-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 900;
    }

    .base-panel h2,
    .base-panel h3 {
      margin: 0 0 10px;
      color: #4f3342;
      font-size: clamp(1.18rem, 2.4vw, 1.55rem);
      letter-spacing: 0;
    }

    .base-panel p,
    .base-panel blockquote {
      margin: 0;
      color: #66485a;
      font-size: 1rem;
      line-height: 1.75;
    }

    .base-panel blockquote {
      font-weight: 700;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 4px 0 18px;
      padding: 0 4px;
    }

    .filter-button {
      min-height: 36px;
      padding: 8px 13px;
      color: #6b4d5f;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(93, 61, 86, 0.1);
      backdrop-filter: blur(14px);
      transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .filter-button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.62);
    }

    .filter-button.is-active {
      color: #fffaf8;
      background: #8b5e76;
      box-shadow: 0 12px 30px rgba(99, 65, 91, 0.22);
    }

    .member-section {
      margin-top: 22px;
    }

    .section-heading {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .section-heading h2 {
      margin: 0;
      color: #503241;
      font-size: clamp(1.32rem, 3vw, 2rem);
      letter-spacing: 0;
    }

    .section-heading p {
      margin: 0;
      color: var(--soft-ink);
      font-size: 0.96rem;
    }

    .member-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 252px), 1fr));
      gap: 18px;
    }

    .member-card {
      position: relative;
      display: grid;
      gap: 16px;
      min-height: 260px;
      padding: 22px;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(1.2);
      cursor: pointer;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .member-card::before {
      position: absolute;
      top: 0;
      right: 18px;
      width: 54px;
      height: 3px;
      content: "";
      background: var(--accent, #e7a7bc);
      border-radius: 999px;
      opacity: 0.82;
    }

    .member-card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow-hover);
    }

    .member-card:focus-visible,
    .filter-button:focus-visible,
    .modal-close:focus-visible {
      outline: 3px solid rgba(108, 72, 94, 0.42);
      outline-offset: 4px;
    }

    .member-top {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .avatar {
      display: grid;
      flex: 0 0 64px;
      width: 64px;
      height: 64px;
      place-items: center;
      font-size: 2rem;
      background: var(--avatar-bg);
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.46), 0 12px 30px rgba(86, 56, 82, 0.18);
    }

    .member-name {
      min-width: 0;
    }

    .member-name h3 {
      margin: 0 0 5px;
      color: #4e3241;
      font-size: 1.28rem;
      letter-spacing: 0;
    }

    .role {
      margin: 0;
      color: #7f6575;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .member-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: #8c7180;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .signature {
      margin: 0;
      color: #5e4252;
      font-size: 1rem;
      line-height: 1.72;
    }

    .latest {
      align-self: end;
      display: grid;
      gap: 7px;
      padding: 13px 14px;
      color: #66485a;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.48);
      border-radius: 8px;
    }

    .latest-label {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .latest-title {
      margin: 0;
      font-size: 0.94rem;
      line-height: 1.52;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      color: #77596a;
      font-size: 0.78rem;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.48);
      border-radius: 999px;
    }

    .card-action {
      color: #7a4f66;
      font-size: 0.84rem;
      font-weight: 900;
    }

    .story-section {
      display: grid;
      gap: 22px;
      margin-top: 34px;
    }

    .story-band {
      display: grid;
      gap: 16px;
    }

    .story-title {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px;
    }

    .story-title h2 {
      margin: 0;
      color: #503241;
      font-size: clamp(1.28rem, 2.6vw, 1.86rem);
      letter-spacing: 0;
    }

    .story-title p {
      margin: 0;
      color: var(--soft-ink);
      font-size: 0.95rem;
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 14px;
      padding: 16px 18px;
      background: rgba(255, 250, 247, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(95, 63, 88, 0.12);
      backdrop-filter: blur(18px);
    }

    .timeline-date {
      color: #8a6478;
      font-size: 0.9rem;
      font-weight: 900;
    }

    .timeline-copy {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .timeline-copy strong {
      color: #553746;
      font-size: 1rem;
    }

    .timeline-copy span {
      color: #73576a;
      line-height: 1.6;
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 180px), 1fr));
      gap: 14px;
    }

    .memory-card {
      display: grid;
      gap: 8px;
      min-height: 138px;
      padding: 17px;
      background: rgba(255, 252, 242, 0.54);
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(95, 63, 88, 0.12);
      backdrop-filter: blur(18px);
    }

    .memory-icon {
      font-size: 1.55rem;
    }

    .memory-card strong {
      color: #553746;
    }

    .memory-card span {
      color: #765b6d;
      font-size: 0.92rem;
      line-height: 1.62;
    }

    .footer {
      display: grid;
      gap: 14px;
      margin-top: 32px;
      padding: 22px 4px 0;
      text-align: center;
    }

    .stats {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 14px 18px;
      color: #5e4052;
      font-weight: 800;
      line-height: 1.55;
      background: var(--paper-strong);
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 8px;
      box-shadow: 0 14px 38px rgba(97, 65, 89, 0.15);
      backdrop-filter: blur(18px);
    }

    .tiny-note {
      margin: 0;
      color: rgba(89, 62, 78, 0.72);
      font-size: 0.9rem;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(58, 37, 50, 0.36);
      backdrop-filter: blur(12px);
    }

    .modal-backdrop[hidden] {
      display: none;
    }

    .modal-dialog {
      position: relative;
      width: min(100%, 620px);
      max-height: min(86vh, 760px);
      overflow: auto;
      padding: 26px;
      background:
        radial-gradient(circle at 88% 8%, rgba(255, 228, 236, 0.86), transparent 170px),
        rgba(255, 252, 248, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 8px;
      box-shadow: 0 30px 90px rgba(54, 32, 48, 0.34);
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      color: #6d4c5e;
      font-size: 1.45rem;
      line-height: 1;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(122, 87, 105, 0.14);
      border-radius: 999px;
    }

    .modal-profile {
      display: grid;
      gap: 18px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-right: 38px;
    }

    .modal-avatar {
      display: grid;
      flex: 0 0 76px;
      width: 76px;
      height: 76px;
      place-items: center;
      font-size: 2.35rem;
      background: var(--avatar-bg);
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 999px;
      box-shadow: 0 16px 34px rgba(86, 56, 82, 0.18);
    }

    .modal-head h2 {
      margin: 0 0 6px;
      color: #4f3342;
      font-size: clamp(1.58rem, 4vw, 2.25rem);
      letter-spacing: 0;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .modal-info {
      display: grid;
      gap: 4px;
      padding: 13px;
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 8px;
    }

    .modal-info span {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
    }

    .modal-info strong {
      color: #5c4050;
      font-size: 0.96rem;
      line-height: 1.55;
    }

    .modal-message {
      padding: 16px;
      color: #5f4354;
      line-height: 1.76;
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 8px;
    }

    body.modal-open {
      overflow: hidden;
    }

    @keyframes floatGently {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(-4deg);
      }
      50% {
        transform: translate3d(0, -16px, 0) rotate(5deg);
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 24px, var(--max-width));
        padding-top: 32px;
      }

      .hero {
        margin-bottom: 28px;
      }

      .section-heading {
        align-items: start;
      }

      .base-dashboard {
        grid-template-columns: 1fr;
      }

      .member-card {
        min-height: auto;
        padding: 20px;
      }

      .timeline-item {
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .modal-grid {
        grid-template-columns: 1fr;
      }

      .modal-dialog {
        padding: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @supports not (backdrop-filter: blur(1px)) {
      .eyebrow,
      .mood-chip,
      .base-panel,
      .filter-button,
      .member-card,
      .timeline-item,
      .memory-card,
      .stats {
        background: rgba(255, 250, 247, 0.88);
      }
    }
  </style>
</head>
<body>
  <span class="ambient ambient--one" aria-hidden="true">✦</span>
  <span class="ambient ambient--two" aria-hidden="true">♡</span>
  <span class="ambient ambient--three" aria-hidden="true">✧</span>

  <main class="page">
    <header class="hero">
      <div class="eyebrow">✦ 11人的秘密日记基地 ✦</div>
      <h1>secret base♡</h1>
      <p class="subtitle">11人的秘密日记基地 / 只属于我们的共享日记</p>
      <p class="description">这里是只属于我们的秘密基地，记录着11人共同书写的日记与故事。</p>
      <div class="mood-row" aria-label="今日心情">
        <span class="mood-chip">今日心情：把一颗星星放进口袋</span>
        <span class="mood-chip">秘密温度：微甜</span>
      </div>
    </header>

    <section class="base-dashboard" aria-label="秘密基地动态">
      <article class="base-panel">
        <span class="panel-kicker">📌 BASE NOTICE</span>
        <h2>秘密基地公告</h2>
        <p id="announcementText">正在翻找今天的小纸条...</p>
      </article>
      <article class="base-panel">
        <span class="panel-kicker">✦ TODAY LINE</span>
        <h2>今日随机日记</h2>
        <blockquote id="randomQuote">正在从日记本里抽一句话...</blockquote>
      </article>
    </section>

    <section class="member-section" aria-labelledby="member-title">
      <div class="section-heading">
        <div>
          <h2 id="member-title">成员日记签</h2>
          <p id="member-count">正在整理秘密名单...</p>
        </div>
      </div>
      <div class="filter-row" id="tagFilters" aria-label="成员标签筛选"></div>
      <div class="member-grid" id="memberGrid"></div>
    </section>

    <section class="story-section" aria-label="共享日记内容">
      <div class="story-band" aria-labelledby="timeline-title">
        <div class="story-title">
          <div>
            <h2 id="timeline-title">最近更新</h2>
            <p>把新写下的片段排成一条柔软时间线</p>
          </div>
        </div>
        <div class="timeline" id="timelineList"></div>
      </div>

      <div class="story-band" aria-labelledby="memory-title">
        <div class="story-title">
          <div>
            <h2 id="memory-title">记忆碎片</h2>
            <p>不放真实照片，也能保留共同生活的光</p>
          </div>
        </div>
        <div class="memory-grid" id="memoryGrid"></div>
      </div>
    </section>

    <footer class="footer">
      <div class="stats" id="diaryStats">📖 至今写下了 215 篇秘密日记</div>
      <p class="tiny-note">愿每一次翻页，都能遇见一点温柔。</p>
    </footer>
  </main>

  <div class="modal-backdrop" id="memberModal" hidden>
    <section class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalName">
      <button class="modal-close" id="modalClose" type="button" aria-label="关闭成员档案">×</button>
      <div id="modalBody"></div>
    </section>
  </div>

  <script>
    /*
      维护说明：

    /*

      - announcements：秘密基地公告，每天按日期自动换一条

      - diaryTimeline：最近更新列表，适合放公开、虚构或已脱敏的日记标题

    let activeTag = "全部";
    let lastFocusedElement = null;

    function escapeHTML(value = "") {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderBaseNotes() {
      const todayIndex = new Date().getDate() % announcements.length;
      const randomIndex = Math.floor(Math.random() * randomQuotes.length);

      document.getElementById("announcementText").textContent = announcements[todayIndex];
      document.getElementById("randomQuote").textContent = `“${randomQuotes[randomIndex]}”`;
    }

    function getAllTags() {
      return Array.from(new Set(members.flatMap((member) => member.tags || [])));
    }

    function renderFilters() {
      const filterWrap = document.getElementById("tagFilters");
      const tags = ["全部", ...getAllTags()];

      filterWrap.innerHTML = tags.map((tag) => `
        <button
          class="filter-button${tag === activeTag ? " is-active" : ""}"
          type="button"
          data-tag="${escapeHTML(tag)}"
          aria-pressed="${tag === activeTag}"
        >
          ${escapeHTML(tag)}
        </button>
      `).join("");

      filterWrap.querySelectorAll(".filter-button").forEach((button) => {
        button.addEventListener("click", () => {
          activeTag = button.dataset.tag;
          renderFilters();
          renderMembers();
        });
      });
    }

    function renderMembers() {
      const grid = document.getElementById("memberGrid");
      const countText = document.getElementById("member-count");
      const stats = document.getElementById("diaryStats");
      const totalDiaries = members.reduce((sum, member) => sum + Number(member.diaryCount || 0), 0);
      const visibleMembers = members
        .map((member, index) => ({ member, index }))
        .filter(({ member }) => activeTag === "全部" || (member.tags || []).includes(activeTag));

      grid.innerHTML = visibleMembers.map(({ member, index }) => `
        <article
          class="member-card"
          tabindex="0"
          role="button"
          data-member-index="${index}"
          aria-label="打开${escapeHTML(member.name)}的成员档案"
          style="--avatar-bg: ${member.avatarBg}; --accent: ${member.accent};"
        >
          <div class="member-top">
            <div class="avatar" aria-hidden="true">${escapeHTML(member.avatar)}</div>
            <div class="member-name">
              <h3>${escapeHTML(member.name)}</h3>
              <p class="role">${escapeHTML(member.role)}</p>
            </div>
          </div>
          <div class="member-meta">
            <span>${escapeHTML(member.number)}</span>
            <span>${escapeHTML(member.joinDate)}</span>
            <span>${escapeHTML(member.baseColor)}</span>
          </div>
          <p class="signature">${escapeHTML(member.signature)}</p>
          <div class="tag-list" aria-label="${escapeHTML(member.name)}的标签">
            ${(member.tags || []).map((tag) => `<span class="tag-pill">${escapeHTML(tag)}</span>`).join("")}
          </div>
          <div class="latest">
            <span class="latest-label">最近日记</span>
            <p class="latest-title">${escapeHTML(member.latest)}</p>
          </div>
          <span class="card-action">查看成员档案</span>
        </article>
      `).join("");

      countText.textContent = activeTag === "全部"
        ? `${members.length} 位成员正在这里交换秘密与日常`
        : `${visibleMembers.length} 位 ${activeTag} 成员正在这里发光`;
      stats.textContent = `📖 ${members.length} 位成员至今写下了 ${totalDiaries} 篇秘密日记`;
    }

    function renderTimeline() {
      const timelineList = document.getElementById("timelineList");

      timelineList.innerHTML = diaryTimeline.map((item) => `
        <article class="timeline-item">
          <time class="timeline-date">${escapeHTML(item.date)}</time>
          <div class="timeline-copy">
            <strong>${escapeHTML(item.author)} · ${escapeHTML(item.title)}</strong>
            <span>${escapeHTML(item.text)}</span>
          </div>
        </article>
      `).join("");
    }

    function renderMemoryFragments() {
      const memoryGrid = document.getElementById("memoryGrid");

      memoryGrid.innerHTML = memoryFragments.map((item) => `
        <article class="memory-card">
          <span class="memory-icon" aria-hidden="true">${escapeHTML(item.icon)}</span>
          <strong>${escapeHTML(item.title)}</strong>
          <span>${escapeHTML(item.text)}</span>
        </article>
      `).join("");
    }

    function openMemberModal(index) {
      const member = members[index];
      const modal = document.getElementById("memberModal");
      const modalBody = document.getElementById("modalBody");

      if (!member) return;

      lastFocusedElement = document.activeElement;
      modalBody.innerHTML = `
        <article class="modal-profile" style="--avatar-bg: ${member.avatarBg}; --accent: ${member.accent};">
          <div class="modal-head">
            <div class="modal-avatar" aria-hidden="true">${escapeHTML(member.avatar)}</div>
            <div>
              <h2 id="modalName">${escapeHTML(member.name)}</h2>
              <p class="role">${escapeHTML(member.role)}</p>
              <div class="tag-list">
                ${(member.tags || []).map((tag) => `<span class="tag-pill">${escapeHTML(tag)}</span>`).join("")}
              </div>
            </div>
          </div>
          <p class="modal-message">${escapeHTML(member.message)}</p>
          <div class="modal-grid">
            <div class="modal-info">
              <span>成员编号</span>
              <strong>${escapeHTML(member.number)}</strong>
            </div>
            <div class="modal-info">
              <span>入驻日期</span>
              <strong>${escapeHTML(member.joinDate)}</strong>
            </div>
            <div class="modal-info">
              <span>基地色</span>
              <strong>${escapeHTML(member.baseColor)}</strong>
            </div>
            <div class="modal-info">
              <span>常写关键词</span>
              <strong>${escapeHTML((member.keywords || []).join(" / "))}</strong>
            </div>
            <div class="modal-info">
              <span>喜欢记录</span>
              <strong>${escapeHTML(member.favorite)}</strong>
            </div>
            <div class="modal-info">
              <span>最近日记</span>
              <strong>${escapeHTML(member.latest)}</strong>
            </div>
          </div>
        </article>
      `;

      modal.hidden = false;
      document.body.classList.add("modal-open");
      document.getElementById("modalClose").focus();
    }

    function closeMemberModal() {
      const modal = document.getElementById("memberModal");

      modal.hidden = true;
      document.body.classList.remove("modal-open");
      if (lastFocusedElement) {
        lastFocusedElement.focus();
      }
    }

    function bindMemberGridEvents() {
      const grid = document.getElementById("memberGrid");

      grid.addEventListener("click", (event) => {
        const card = event.target.closest(".member-card");
        if (!card) return;
        openMemberModal(Number(card.dataset.memberIndex));
      });

      grid.addEventListener("keydown", (event) => {
        const card = event.target.closest(".member-card");
        if (!card || !["Enter", " "].includes(event.key)) return;
        event.preventDefault();
        openMemberModal(Number(card.dataset.memberIndex));
      });
    }

    function bindModalEvents() {
      const modal = document.getElementById("memberModal");
      const closeButton = document.getElementById("modalClose");

      closeButton.addEventListener("click", closeMemberModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeMemberModal();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (!modal.hidden && event.key === "Escape") {
          closeMemberModal();
        }
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderBaseNotes();
      renderFilters();
      renderMembers();
      renderTimeline();
      renderMemoryFragments();
      bindMemberGridEvents();
      bindModalEvents();
    });
